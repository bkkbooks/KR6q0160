body:
  text: 佛弟子覺因錢唐胡文煥著十牛圖者蓋禪宗託喻於此以修心證道者也牧童即人也牛即心也圓光即人心俱渾化而證於本然之道也夫心孰不有乎有則皆當修也道孰不具乎具則皆當證也然此獨為禪宗之喻已哉雖吾儒亦同然矣獨吾儒為同然已哉雖天下之人亦皆同然矣要之始終無異其理甚明第為物欲所蔽故甘牛之不若耳夫牛且可馴而謂心不可修者未之有矣心可修而謂道不可證者又未之有矣且道既謂本然而心則何俟乎修物欲之蔽故也故豫既摘十牛圖復附之以苦樂因緣圖將使人知物欲之故而汲汲然克之以證乎本然耳然二圖似出乎一喻而喻又不出乎一理也覽之者了然有所得擴而充之若云吾身亦夢幻泡影露電之喻也則此又何是喻哉彼無待乎還元不假於託喻者斯又最上乘矣噫下此者其亦勉之普明詠未牧生獰頭角恣咆哮奔走溪山路轉遙一片黑雲橫谷口誰知步步犯嘉苗雲菴和未牧心狂力壯鎮咆哮平貼家邦遠更遙涉險登危妄奔逐時時誰顧食人苗普明詠初調我有芒繩驀鼻穿一回奔競痛加鞭從來劣性難調制猶得山童盡力牽雲菴和初調玄毛遍體鼻初穿欲制難為不著鞭寄語牧童須盡力乎中紖索再牢牽普明詠受制漸調漸伏息奔馳渡水穿雲步步隨手把芒繩無少緩牧童終日自忘疲雲菴和受制調息心馳不妄馳急牽鼻索急相隨皤然頭角沉階塹猶恨芒童力未疲普明詠回首日久功深始轉頭顛狂心力漸調柔山童未肯全相許猶把芒繩且繫留雲菴和回首牧牛牛已得回頭百煉剛成繞指柔鴨緑春江愁再浪爛繩兒為羈留普明詠馴伏緑楊陰下古溪邊放去收來得自然日暮碧雲芳草地牧童歸去不須牽雲菴和馴伏芳草原頭碧水邊柳陰沙暖步蕭然霜毛已半肥仍膩馴伏相隨不用牽普明詠無礙露地安眠意自如不勞鞭䇿永無拘山童穩坐青松下一曲升平樂有餘雲菴和無礙白牛穩臥體如如六戶虗凝總不拘松下牧童吹一曲點諧風明不盈餘普明詠任運柳岸春波夕照中淡烟芳草緑茸茸饑食渴飲隨時過石上山童睡正濃雲菴和任運淺水平沙一望中羅裙草色正蒙茸柳陰童睡牛方食誰問春光似酒濃普明詠相忘白牛常在白雲中人自無心牛亦同月透白雲雲影白白雲明月任西東雲菴和相忘人牯相忘澤國中間間去就水雲同恬然不復江魚比從月流西日出東普明詠獨照牛兒無處牧童間一片孤雲碧嶂間拍手高歌明月下歸來猶有一重關雲菴和獨照牛忘牧笠有餘間月白風清天地間到此更如通一線自然踏看上頭關普明詠雙泯人牛不見杳無蹤明月光寒萬象空若問其中端的意野花芳草自叢叢雲菴和雙泯牛兒童子絶行蹤了了如空不是空好似太平春色裏依然幽鳥語芳叢昔有優填國王請問賓頭盧尊者佛法中修行如何尊者答曰譬如有人行於曠野大火之中被一狂象所逐其人見一井畔有一樹上有藤其人攀藤懸於井上下有三毒龍四毒蛇樹上有黑白二鼠互相咬藤四畔又有毒蜂螫人其時復有蜜少許滴於口中因貪蜜故遂忘其苦王又問曰此人苦多樂多耶尊者答曰此人都是苦相何樂耶諸智者以譬喻為解遂有偈云二鼠侵藤真百苦四蛇圍井復千憂忽然咬斷藤根子淪沒何時得出頭又夫曠野者三界也樹者苦身也常於衆苦行業不可思議也藤者是命根也象者是無常殺鬼也黑白二鼠者是日月宛轉也井者是黃泉路也三龍者是貪嗔癡三毒也造作地獄餓鬼畜生三惡道四蛇者是地水火風四大又是酒色財氣四非又是生老病死四門手攀藤者是愚癡也蜂蜜者是夫妻也淫欲情愛染著於心心是火身是宅人之火宅不知是衆苦所集也晝夜交煎惟貪恩愛一旦命根斷絶永墮沉淪一失人身萬劫難復切勸諸人趂此色身康健忙裏偷間每日晨昏一心專念南無阿彌陀佛千遍萬遍現世長福消災臨命終時決定往生西方極樂世界頌曰藤摧墮井命難逃象鼠蛇攻手要牢自己彌陀期早悟三塗苦趣莫教遭肥甘酒肉砒中蜜恩愛夫妻笑裏刀奉勸世人須猛省毋令今日又明朝總題胡文煥觀罷牛圖覺了然再觀苦樂有因緣假饒本性非空後畢竟圓光不現前打破禪機心有佛脫離惡趣腹藏天要知此亦非難事試把工夫著一鞭終
